name: Daily Trend Topics for Content Ideas

on:
  schedule:
    - cron: '0 15 * * *'  # Every day at 7am PST (15:00 UTC)
  workflow_dispatch:      # Also allow manual run anytime

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch trending topics from Reddit & GitHub
        run: |
          DATE=$(date '+%Y-%m-%d')
          TIME=$(date '+%H:%M UTC')

          echo "# Daily Trend Topics - $DATE" > topics/daily-trends.md
          echo "" >> topics/daily-trends.md
          echo "*Auto-generated at $TIME | Refresh: run Actions manually anytime*" >> topics/daily-trends.md
          echo "" >> topics/daily-trends.md

          echo "## AI Tools Trending on Reddit Today" >> topics/daily-trends.md
          echo "" >> topics/daily-trends.md
          curl -s --user-agent 'ContentBot/1.0' \
            'https://www.reddit.com/r/artificial+ChatGPT+AItools+MachineLearning/hot.json?limit=10' \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
posts = data['data']['children']
for i, p in enumerate(posts[:10], 1):
    t = p['data']['title']
    s = p['data']['score']
    u = p['data']['url']
    print(f'{i}. **{t}**')
    print(f'   - Score: {s} upvotes')
    print()
" >> topics/daily-trends.md

          echo "" >> topics/daily-trends.md
          echo "## Finance & Side Hustle Trending on Reddit" >> topics/daily-trends.md
          echo "" >> topics/daily-trends.md
          curl -s --user-agent 'ContentBot/1.0' \
            'https://www.reddit.com/r/personalfinance+financialindependence+passive_income+Entrepreneur/hot.json?limit=8' \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
posts = data['data']['children']
for i, p in enumerate(posts[:8], 1):
    t = p['data']['title']
    s = p['data']['score']
    print(f'{i}. **{t}**')
    print(f'   - Score: {s} upvotes')
    print()
" >> topics/daily-trends.md

          echo "" >> topics/daily-trends.md
          echo "## Trending AI Repos on GitHub Today" >> topics/daily-trends.md
          echo "" >> topics/daily-trends.md
          curl -s 'https://api.github.com/search/repositories?q=AI+created:>$(date -d yesterday +%Y-%m-%d)&sort=stars&order=desc&per_page=5' \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
for i, r in enumerate(data.get('items', [])[:5], 1):
    name = r['full_name']
    desc = r.get('description', 'No description') or 'No description'
    stars = r['stargazers_count']
    print(f'{i}. **{name}** ({stars} stars)')
    print(f'   - {desc[:100]}')
    print()
" >> topics/daily-trends.md

          echo "" >> topics/daily-trends.md
          echo "---" >> topics/daily-trends.md
          echo "## How to Use This File" >> topics/daily-trends.md
          echo "1. Pick 1-2 topics from above" >> topics/daily-trends.md
          echo "2. Copy your prompt template from /prompts/" >> topics/daily-trends.md
          echo "3. Paste into Claude/ChatGPT/Gemini with the topic" >> topics/daily-trends.md
          echo "4. Post on YouTube / Xiaohongshu / Reddit / X" >> topics/daily-trends.md

      - name: Commit and push trends file
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          git add topics/daily-trends.md
          git diff --staged --quiet || git commit -m "Daily trends update $(date '+%Y-%m-%d')"
          git push
