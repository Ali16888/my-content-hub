name: Daily Trend Topics for Content Ideas

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create trends report
        run: |
          DATE=$(date '+%Y-%m-%d')
          FILE="topics/daily-trends.md"

          echo "# Daily Trend Topics - $DATE" > $FILE
          echo "" >> $FILE
          echo "*Auto-updated every morning 7am PST via GitHub Actions*" >> $FILE
          echo "" >> $FILE

          echo "## AI Tools Trending on Reddit" >> $FILE
          echo "" >> $FILE
          curl -sf -A "Mozilla/5.0" \
            "https://www.reddit.com/r/artificial+ChatGPT+AItools/hot.json?limit=8" \
            -o /tmp/ai_reddit.json || echo '{"data":{"children":[]}}' > /tmp/ai_reddit.json
          python3 << 'PYEOF'
import json
with open('/tmp/ai_reddit.json') as f:
    data = json.load(f)
posts = data.get('data', {}).get('children', [])
with open('topics/daily-trends.md', 'a') as out:
    for i, p in enumerate(posts[:8], 1):
        d = p['data']
        out.write(f"{i}. **{d['title']}**\n")
        out.write(f"   - {d['score']} upvotes | r/{d['subreddit']}\n\n")
PYEOF

          echo "" >> $FILE
          echo "## Finance & Side Hustle Trending on Reddit" >> $FILE
          echo "" >> $FILE
          curl -sf -A "Mozilla/5.0" \
            "https://www.reddit.com/r/personalfinance+financialindependence+Entrepreneur/hot.json?limit=6" \
            -o /tmp/finance_reddit.json || echo '{"data":{"children":[]}}' > /tmp/finance_reddit.json
          python3 << 'PYEOF2'
import json
with open('/tmp/finance_reddit.json') as f:
    data = json.load(f)
posts = data.get('data', {}).get('children', [])
with open('topics/daily-trends.md', 'a') as out:
    for i, p in enumerate(posts[:6], 1):
        d = p['data']
        out.write(f"{i}. **{d['title']}**\n")
        out.write(f"   - {d['score']} upvotes | r/{d['subreddit']}\n\n")
PYEOF2

          echo "" >> $FILE
          echo "---" >> $FILE
          echo "## How to Use" >> $FILE
          echo "1. Pick a topic above that excites you" >> $FILE
          echo "2. Open /prompts/ folder, copy the right template" >> $FILE
          echo "3. Paste into Claude / ChatGPT / Gemini with your topic" >> $FILE
          echo "4. Post on YouTube, Xiaohongshu, Reddit, or X" >> $FILE

      - name: Commit trends file
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add topics/daily-trends.md
          git diff --staged --quiet || git commit -m "Daily trends $( date '+%Y-%m-%d' )"
          git push
